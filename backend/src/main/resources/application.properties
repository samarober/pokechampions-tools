spring.application.name=backend

spring.datasource.url=jdbc:postgresql://localhost:5432/pokemon_champions
spring.datasource.username=champions_user
spring.datasource.password=champions_password
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# OBLIGAR A TOMCAT Y SWAGGER A MOSTRAR LOS ERRORES
server.error.include-message=always
server.error.include-stacktrace=always
logging.level.org.springdoc=DEBUG
logging.level.org.springframework.web=DEBUG

springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true